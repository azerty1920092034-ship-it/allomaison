name: Rappel Proprietaires AlloMaison

on:
  schedule:
    - cron: '0 8 1,15 * *'  # Le 1er et 15 de chaque mois a 8h
  workflow_dispatch:          # Permet de lancer manuellement

jobs:
  envoyer-rappels:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer emails de rappel
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node << 'EOF'
          const https = require('https');

          const FIREBASE_API_KEY = process.env.FIREBASE_API_KEY;
          const RESEND_API_KEY = process.env.RESEND_API_KEY;

          function httpsGet(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }

          function httpsPost(hostname, path, data, headers) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(data);
              const req = https.request({
                hostname, path, method: 'POST',
                headers: { 'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(body), ...headers }
              }, (res) => {
                let d = '';
                res.on('data', chunk => d += chunk);
                res.on('end', () => resolve(JSON.parse(d)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            // Recupere toutes les maisons disponibles
            const url = `https://firestore.googleapis.com/v1/projects/allomaison-790d3/databases/(default)/documents/maisons?key=${FIREBASE_API_KEY}`;
            const result = await httpsGet(url);
            const maisons = result.documents || [];
            console.log(`${maisons.length} maisons trouvees`);

            for (const maison of maisons) {
              const fields = maison.fields || {};
              const disponible = fields.disponible?.booleanValue;
              if (!disponible) continue;

              const proprietaireId = fields.proprietaireId?.stringValue;
              const type = fields.type?.stringValue || 'Maison';
              const quartier = fields.quartier?.stringValue || '';
              const prix = fields.prix?.stringValue || '';
              const paiement = fields.paiement?.stringValue || '';

              if (!proprietaireId) continue;

              // Recupere l'email du proprietaire
              const userUrl = `https://firestore.googleapis.com/v1/projects/allomaison-790d3/databases/(default)/documents/users/${proprietaireId}?key=${FIREBASE_API_KEY}`;
              const userResult = await httpsGet(userUrl);
              const email = userResult.fields?.email?.stringValue;

              if (!email) continue;

              // Envoie l'email via Resend
              await httpsPost('api.resend.com', '/emails', {
                from: 'AlloMaison <onboarding@resend.dev>',
                to: email,
                subject: 'Votre maison est-elle toujours disponible ?',
                html: `
                  <div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;">
                    <div style="background:#16a34a;padding:20px;border-radius:12px;text-align:center;margin-bottom:24px;">
                      <h1 style="color:white;margin:0;">🏠 ALLOmaison</h1>
                    </div>
                    <h2 style="color:#333;">Bonjour !</h2>
                    <p style="color:#555;font-size:15px;line-height:1.6;">
                      Votre <strong>${type}</strong> a <strong>${quartier}</strong> 
                      est toujours visible sur ALLOmaison.
                    </p>
                    <p style="color:#555;font-size:15px;line-height:1.6;">
                      Est-elle <strong>toujours disponible</strong> a la location ?
                    </p>
                    <div style="background:#f0fdf4;border-radius:12px;padding:16px;margin:24px 0;">
                      <p style="margin:0;font-size:14px;color:#16a34a;">
                        📍 ${type} — ${quartier}<br/>
                        💰 ${prix ? Number(prix).toLocaleString() + ' FCFA ' + paiement : 'Prix non renseigne'}
                      </p>
                    </div>
                    <p style="color:#555;font-size:15px;line-height:1.6;">
                      Si votre maison <strong>n'est plus disponible</strong>, merci de la supprimer 
                      depuis votre espace proprietaire.
                    </p>
                    <div style="text-align:center;margin:32px 0;">
                      <a href="https://allomaison.vercel.app" 
                        style="background:#16a34a;color:white;padding:14px 28px;
                        border-radius:10px;text-decoration:none;font-weight:bold;font-size:15px;">
                        Gerer ma maison →
                      </a>
                    </div>
                    <p style="color:#999;font-size:12px;text-align:center;margin-top:32px;">
                      ALLomaison — Cotonou, Benin
                    </p>
                  </div>
                `
              }, { 'Authorization': `Bearer ${RESEND_API_KEY}` });

              console.log(`Email envoye a ${email}`);
            }
            console.log('Tous les rappels envoyes !');
          }

          main().catch(console.error);
          EOF